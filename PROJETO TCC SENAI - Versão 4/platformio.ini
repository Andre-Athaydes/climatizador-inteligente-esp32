; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
; ── Plataforma e placa ─────────────────────────────────────────────────────
platform = espressif32
board = esp32dev
framework = arduino

; ── Velocidade do monitor serial ──────────────────────────────────────────
monitor_speed = 115200

; ── Filtros do monitor serial (melhora legibilidade dos logs) ─────────────
monitor_filters =
    esp32_exception_decoder   ; decodifica stack traces de crash automaticamente
    time                      ; prefixa cada linha com timestamp

; ── Flags de compilação ────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=1      ; habilita log de nível Warning+ no core ESP32
    -DBOARD_HAS_PSRAM=0       ; ESP32 DevKit padrão sem PSRAM externa
    -DARDUINO_RUNNING_CORE=1  ; garante que o loop() rode no core 1 (padrão)

; ── Upload ────────────────────────────────────────────────────────────────
upload_speed = 921600         ; velocidade máxima para upload rápido
                              ; se falhar, reduza para 460800 ou 115200
; ── Partição de flash ─────────────────────────────────────────────────────
; "min_spiffs" reserva mais espaço para código (1.9 MB app + 190 KB SPIFFS)
; Necessário pois o projeto tem múltiplas bibliotecas pesadas (IRremoteESP8266)
;board_build.partitions = min_spiffs
 


lib_deps = 
    ; --- Infravermelho (ESP32/ESP8266) ---
	crankyoldgit/IRremoteESP8266 @ ^2.9.0
	
	; --- Sensores ---
    ; DHT22 — versão otimizada para ESP32 (usa FreeRTOS internamente)
    beegee-tokyo/DHT sensor library for ESPx @ ^1.19
    ; MLX90614 — sensor de temperatura IR (I2C 0x5A)
    adafruit/Adafruit MLX90614 Library @ ^2.1.5
    
	; --- Display OLED ---
    ; SSD1306 + GFX: sempre instale os dois — GFX é dependência obrigatória
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    
	; --- QR Code ---
    ; Gera QR Codes em buffer de pixels para renderizar no OLED
    ricmoo/QRCode @ ^0.0.1

    ; --- Motor Fuzzy ---
    ; eFLL (Embedded Fuzzy Logic Library) — fornece Fuzzy.h, FuzzyInput,
    ; FuzzyOutput, FuzzySet, FuzzyRule, FuzzyRuleAntecedent, FuzzyRuleConsequent
    zerokol/eFLL @ ^1.4.1	

    ; --- MQTT / IoT ---
    ; PubSubClient — cliente MQTT leve, compatível com ThingsBoard.
    ; Usado em IoT.cpp para publicar telemetria e receber RPC.
    knolleary/PubSubClient @ ^2.8
		
	beegee-tokyo/DHT sensor library for ESPx@^1.19
	adafruit/Adafruit MLX90614 Library@^2.1.5
	adafruit/Adafruit SSD1306@^2.5.9
	adafruit/Adafruit GFX Library@^1.11.9
	ricmoo/QRCode@^0.0.1
	zerokol/eFLL @ ^1.4.1
	z3t0/IRremote @ ^4.0.0
	crankyoldgit/IRremoteESP8266@^2.9.0
